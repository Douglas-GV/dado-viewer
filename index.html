<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dado Triple — Visor en vivo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0f0f0f; color: #fff; font-family: 'Segoe UI', sans-serif; padding: 20px; }
    h1 { color: #ff3333; text-align: center; margin-bottom: 8px; font-size: 2rem; }
    .subtitle { text-align: center; color: #aaa; margin-bottom: 24px; font-size: 0.9rem; }
    #status { text-align: center; padding: 8px; border-radius: 6px; margin-bottom: 20px; font-size: 0.85rem; }
    .connected { background: #1a3a1a; color: #44ff44; }
    .disconnected { background: #3a1a1a; color: #ff4444; }
    #rooms { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
    .room-card { background: #1a1a1a; border: 1px solid #333; border-radius: 12px; padding: 16px; }
    .room-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .room-code { font-size: 1.4rem; font-weight: bold; color: #ff3333; letter-spacing: 2px; }
    .room-phase { font-size: 0.75rem; padding: 4px 10px; border-radius: 20px; font-weight: bold; text-transform: uppercase; }
    .phase-lobby { background: #333; color: #aaa; }
    .phase-rolling { background: #1a3a1a; color: #44ff44; }
    .phase-prediction { background: #3a3a1a; color: #ffaa00; }
    .phase-presenting { background: #1a1a3a; color: #4488ff; }
    .phase-round_end { background: #3a1a3a; color: #ff44ff; }
    .phase-game_over { background: #3a1a1a; color: #ff4444; }
    .room-info { color: #888; font-size: 0.8rem; margin-bottom: 12px; }
    .players-list { border-top: 1px solid #333; padding-top: 10px; }
    .player-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid #222; }
    .player-row:last-child { border-bottom: none; }
    .player-nick { font-size: 0.95rem; }
    .player-score { color: #ffaa00; font-weight: bold; font-size: 0.9rem; }
    .player-ready { font-size: 0.75rem; padding: 2px 8px; border-radius: 10px; }
    .ready { background: #1a3a1a; color: #44ff44; }
    .waiting { background: #333; color: #888; }
    #empty { text-align: center; color: #555; margin-top: 60px; font-size: 1.1rem; }
    .round-badge { color: #aaa; font-size: 0.8rem; }
  </style>
</head>
<body>
  <h1>🎲 DADO TRIPLE</h1>
  <p class="subtitle">Visor de partidas en tiempo real</p>
  <div id="status" class="disconnected">⚡ Conectando...</div>
  <div id="rooms"></div>
  <div id="empty" style="display:none">No hay salas activas en este momento</div>

  <script>
    const WS_URL = 'wss://imposed-switch-pdf-newspaper.trycloudflare.com';

    let ws = null;
    let reconnectTimer = null;

    function connect() {
      ws = new WebSocket(WS_URL);

      ws.onopen = () => {
        console.log('✅ Conectado');
        setStatus(true);
        ws.send(JSON.stringify({ type: 'SPECTATE' }));
        if (reconnectTimer) clearTimeout(reconnectTimer);
      };

      ws.onmessage = (e) => {
        try {
          const data = JSON.parse(e.data);
          if (data.type === 'SPECTATOR_STATE') {
            renderRooms(data.rooms);
          }
        } catch (err) {
          console.error('Parse error:', err);
        }
      };

      ws.onclose = () => {
        console.log('❌ Desconectado — reconectando en 3s...');
        setStatus(false);
        reconnectTimer = setTimeout(connect, 3000);
      };

      ws.onerror = () => {
        ws.close();
      };
    }

    function setStatus(ok) {
      const el = document.getElementById('status');
      el.className = ok ? 'connected' : 'disconnected';
      el.textContent = ok ? '🟢 Conectado en tiempo real' : '🔴 Desconectado — reconectando...';
    }

    function phaseLabel(phase) {
      const map = {
        lobby: 'Lobby',
        rolling: 'Lanzando dados',
        prediction: 'Predicciones',
        presenting: 'Presentando',
        round_end: 'Fin de ronda',
        game_over: 'Juego terminado',
      };
      return map[phase] || phase;
    }

    function renderRooms(rooms) {
      const container = document.getElementById('rooms');
      const empty = document.getElementById('empty');
      container.innerHTML = '';

      if (!rooms || rooms.length === 0) {
        empty.style.display = 'block';
        return;
      }
      empty.style.display = 'none';

      rooms.forEach(room => {
        const card = document.createElement('div');
        card.className = 'room-card';

        const playersHtml = room.players.map(p => `
          <div class="player-row">
            <span class="player-nick">${p.nick || 'Anon'}</span>
            <span class="player-score">${p.score} pts</span>
            <span class="player-ready ${p.ready ? 'ready' : 'waiting'}">
              ${p.ready ? 'Listo' : 'Esperando'}
            </span>
          </div>
        `).join('');

        card.innerHTML = `
          <div class="room-header">
            <span class="room-code">${room.room_id}</span>
            <span class="room-phase phase-${room.phase}">${phaseLabel(room.phase)}</span>
          </div>
          <div class="room-info">
            👥 ${room.player_count} jugadores
            <span class="round-badge" style="margin-left:12px">• Ronda ${room.round}/4</span>
          </div>
          <div class="players-list">
            ${playersHtml || '<p style="color:#555;font-size:0.8rem">Sin jugadores aún</p>'}
          </div>
        `;

        container.appendChild(card);
      });
    }

    connect();
  </script>
</body>
</html>
