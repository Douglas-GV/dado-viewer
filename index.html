<!DOCTYPE html>
/* --- Hola ---*/
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dado Triple — Visor en vivo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0f0f0f; color: #fff; font-family: 'Segoe UI', sans-serif; padding: 20px; }
    h1 { color: #ff3333; text-align: center; margin-bottom: 8px; font-size: 2rem; }
    .subtitle { text-align: center; color: #aaa; margin-bottom: 24px; font-size: 0.9rem; }
    #status { text-align: center; padding: 8px; border-radius: 6px; margin-bottom: 20px; font-size: 0.85rem; }
    .connected { background: #1a3a1a; color: #44ff44; }
    .disconnected { background: #3a1a1a; color: #ff4444; }

    #rooms { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 20px; }

    .room-card {
      background: #1a1a1a; border: 1px solid #333; border-radius: 12px;
      padding: 16px; display: flex; flex-direction: column; gap: 10px;
    }

    .room-header { display: flex; justify-content: space-between; align-items: center; }
    .room-code { font-size: 1.4rem; font-weight: bold; color: #ff3333; letter-spacing: 2px; }
    .room-meta { color: #888; font-size: 0.78rem; }

    .room-phase {
      font-size: 0.72rem; padding: 4px 10px; border-radius: 20px;
      font-weight: bold; text-transform: uppercase;
    }
    .phase-lobby       { background: #333;    color: #aaa; }
    .phase-rolling     { background: #1a3a1a; color: #44ff44; }
    .phase-prediction  { background: #3a3a1a; color: #ffaa00; }
    .phase-presenting  { background: #1a1a3a; color: #4488ff; }
    .phase-round_end   { background: #3a1a3a; color: #ff44ff; }
    .phase-game_over   { background: #3a1a1a; color: #ff4444; }

    /* ---- Jugadores ---- */
    .players-section { border-top: 1px solid #2a2a2a; padding-top: 10px; }
    .section-title { font-size: 0.7rem; color: #666; text-transform: uppercase;
                     letter-spacing: 1px; margin-bottom: 8px; }

    .player-row {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 8px; border-radius: 8px; margin-bottom: 4px;
      background: #111;
    }
    .player-row.is-turn { background: #1a1a00; border: 1px solid #ffaa00; }

    .player-avatar {
      width: 28px; height: 28px; border-radius: 50%; background: #333;
      display: flex; align-items: center; justify-content: center;
      font-weight: bold; font-size: 0.8rem; flex-shrink: 0;
    }
    .owner-avatar { background: #5a3a00; color: #ffcc00; }

    .player-info { flex: 1; }
    .player-name { font-size: 0.9rem; display: flex; align-items: center; gap: 6px; }
    .badge-owner { background: #5a3a00; color: #ffcc00; font-size: 0.6rem;
                   padding: 1px 6px; border-radius: 10px; font-weight: bold; }
    .badge-ready { background: #1a3a1a; color: #44ff44; font-size: 0.6rem;
                   padding: 1px 6px; border-radius: 10px; }
    .badge-wait  { background: #2a2a2a; color: #666; font-size: 0.6rem;
                   padding: 1px 6px; border-radius: 10px; }
    .badge-turn  { background: #3a3a00; color: #ffff44; font-size: 0.6rem;
                   padding: 1px 6px; border-radius: 10px; }

    .player-score { font-size: 0.8rem; color: #ffaa00; font-weight: bold; text-align: right; }
    .player-round-score { font-size: 0.68rem; color: #888; text-align: right; }

    /* ---- Dados ---- */
    .dice-area { margin-top: 4px; }
    .dice-label { font-size: 0.65rem; color: #555; margin-bottom: 3px; }
    .dice-row { display: flex; flex-wrap: wrap; gap: 3px; }

    .die {
      width: 22px; height: 22px; border-radius: 4px; background: #2a2a2a;
      border: 1px solid #444; display: flex; align-items: center;
      justify-content: center; font-size: 0.7rem; font-weight: bold; color: #fff;
    }
    .die.selected { background: #ff3333; border-color: #ff6666; }
    .die.combo    { background: #1a3a1a; border-color: #44ff44; }

    /* ---- Combinación ---- */
    .combo-row {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 8px; background: #0a1a0a; border-radius: 6px;
      border: 1px solid #1a3a1a; margin-top: 4px;
    }
    .combo-label { font-size: 0.65rem; color: #44ff44; }
    .combo-type  { font-size: 0.65rem; color: #aaffaa; font-weight: bold; }

    /* ---- Predicción ---- */
    .pred-badge {
      font-size: 0.62rem; padding: 2px 7px; border-radius: 10px; font-weight: bold;
    }
    .pred-ZERO  { background: #2a1a1a; color: #ff6666; }
    .pred-MIN   { background: #1a2a1a; color: #66ff66; }
    .pred-MORE  { background: #1a1a2a; color: #6688ff; }
    .pred-MAX   { background: #2a2a1a; color: #ffff66; }

    /* ---- Vacío ---- */
    #empty { text-align: center; color: #555; margin-top: 60px; font-size: 1.1rem; }
  </style>
</head>
<body>
  <h1>🎲 DADO TRIPLE</h1>
  <p class="subtitle">Visor de partidas en tiempo real</p>
  <div id="status" class="disconnected">⚡ Conectando...</div>
  <div id="rooms"></div>
  <div id="empty" style="display:none">No hay salas activas en este momento</div>

  <script>
    const WS_URL = "wss://dados-viewer.duckdns.org";
    let ws = null;
    let reconnectTimer = null;

    // ── Helpers ──────────────────────────────────────────────
    function phaseLabel(phase) {
      return {
        lobby: 'Lobby', rolling: 'Lanzando dados', prediction: 'Predicciones',
        presenting: 'Presentando', round_end: 'Fin de ronda', game_over: 'Juego terminado',
      }[phase] || phase;
    }

    function classifyCombination(dice) {
      if (!dice || dice.length < 3) return '';
      const s = [...dice].sort((a, b) => a - b);
      if (s[0] === s[1] && s[1] === s[2]) return `Triple ${s[0]}s`;
      if (s[2] === s[1] + 1 && s[1] === s[0] + 1) return `Escalera ${s[0]}-${s[1]}-${s[2]}`;
      if (s[0] === s[1]) return `Doble ${s[0]}s`;
      if (s[1] === s[2]) return `Doble ${s[1]}s`;
      return `Sencillo (high ${s[2]})`;
    }

    function dieHtml(val, cls = '') {
      return `<div class="die ${cls}">${val}</div>`;
    }

    // ── Render ────────────────────────────────────────────────
    function renderRooms(rooms) {
      const container = document.getElementById('rooms');
      const empty     = document.getElementById('empty');
      container.innerHTML = '';

      if (!rooms || rooms.length === 0) {
        empty.style.display = 'block';
        return;
      }
      empty.style.display = 'none';

      rooms.forEach(room => {
        const card = document.createElement('div');
        card.className = 'room-card';

        // ── Jugadores ──
        const playersHtml = room.players.map((p, i) => {
          const isOwner  = p.is_owner;
          const isTurn   = room.current_turn && (
            // current_turn es client_id; lo comparamos por posición si no tenemos client_id en el payload
            room.players.findIndex(x => x === p) === room.players.findIndex(
              (_, idx) => room.players[idx].nick === (room.players.find(
                (_, ti) => ti === room.players.indexOf(p)
              ) || {}).nick
            )
          );

          // Turno: buscamos por índice en presentation_order si existe, si no por posición
          const myTurn = room.current_turn_nick === p.nick; // lo añadiremos abajo

          // Dados blancos
          let diceSection = '';
          if (p.white_dice && p.white_dice.length > 0) {
            const diceHtml = p.white_dice.map(d => dieHtml(d)).join('');
            diceSection += `
              <div class="dice-area">
                <div class="dice-label">Dados blancos</div>
                <div class="dice-row">${diceHtml}</div>
              </div>`;
          }

          // Dados restantes (en fase presenting)
          if (p.remaining_dice && p.remaining_dice.length > 0 && room.phase === 'presenting') {
            const remHtml = p.remaining_dice.map(d => dieHtml(d)).join('');
            diceSection += `
              <div class="dice-area" style="margin-top:4px">
                <div class="dice-label">Restantes</div>
                <div class="dice-row">${remHtml}</div>
              </div>`;
          }

          // Combinación enviada
          let comboSection = '';
          if (p.submitted_combination && p.submitted_combination.length > 0) {
            const comboType = classifyCombination(p.submitted_combination);
            const comboDice = p.submitted_combination.map(d => dieHtml(d, 'combo')).join('');
            comboSection = `
              <div class="combo-row">
                <span class="combo-label">Combinación:</span>
                <div class="dice-row">${comboDice}</div>
                <span class="combo-type">${comboType}</span>
              </div>`;
          }

          // Predicción
          let predSection = '';
          if (p.prediction_submitted && p.prediction) {
            predSection = `<span class="pred-badge pred-${p.prediction}">${p.prediction}</span>`;
          }

          const avatarClass = isOwner ? 'player-avatar owner-avatar' : 'player-avatar';
          const avatarChar  = (p.nick || '?')[0].toUpperCase();
          const rowClass    = `player-row${p.is_turn ? ' is-turn' : ''}`;

          return `
            <div class="${rowClass}">
              <div class="${avatarClass}">${avatarChar}</div>
              <div class="player-info">
                <div class="player-name">
                  ${p.nick || 'Anon'}
                  ${isOwner ? '<span class="badge-owner">OWNER</span>' : ''}
                  ${p.ready  ? '<span class="badge-ready">Listo</span>' : '<span class="badge-wait">Esperando</span>'}
                  ${predSection}
                </div>
                ${diceSection}
                ${comboSection}
              </div>
              <div>
                <div class="player-score">${p.score} pts</div>
                ${p.round_score > 0 ? `<div class="player-round-score">+${p.round_score} ronda</div>` : ''}
              </div>
            </div>`;
        }).join('');

        card.innerHTML = `
          <div class="room-header">
            <span class="room-code">${room.room_id}</span>
            <span class="room-phase phase-${room.phase}">${phaseLabel(room.phase)}</span>
          </div>
          <div class="room-meta">
            👥 ${room.player_count} jugadores &nbsp;•&nbsp; Ronda ${room.round}/4
            ${room.phase === 'presenting' ? `&nbsp;•&nbsp; Presentación ${(room.current_presentation || 0) + 1}/3` : ''}
          </div>
          <div class="players-section">
            <div class="section-title">Jugadores</div>
            ${playersHtml || '<p style="color:#555;font-size:0.8rem">Sin jugadores</p>'}
          </div>`;

        container.appendChild(card);
      });
    }

    // ── WebSocket ─────────────────────────────────────────────
    function connect() {
      ws = new WebSocket(WS_URL);

      ws.onopen = () => {
        setStatus(true);
        ws.send(JSON.stringify({ type: 'SPECTATE' }));
        if (reconnectTimer) clearTimeout(reconnectTimer);
      };

      ws.onmessage = (e) => {
        try {
          const data = JSON.parse(e.data);
          if (data.type === 'SPECTATOR_STATE') renderRooms(data.rooms);
        } catch (err) { console.error('Parse error:', err); }
      };

      ws.onclose = () => { setStatus(false); reconnectTimer = setTimeout(connect, 3000); };
      ws.onerror = () => ws.close();
    }

    function setStatus(ok) {
      const el = document.getElementById('status');
      el.className = ok ? 'connected' : 'disconnected';
      el.textContent = ok ? '🟢 Conectado en tiempo real' : '🔴 Desconectado — reconectando...';
    }

    connect();
  </script>
</body>
</html>
